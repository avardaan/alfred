# Render Blueprint — Alfred webhook server
# Apply: https://dashboard.render.com/blueprint/new?repo=https://github.com/avardaan/alfred
# Sync: push to main updates managed resources

projects:
  - name: alfred
    environments:
      - name: production
        services:
          - type: web
            name: alfred
            runtime: docker
            plan: free
            region: oregon
            branch: main
            repo: https://github.com/avardaan/alfred
            autoDeployTrigger: commit
            dockerfilePath: ./Dockerfile
            dockerContext: .
            healthCheckPath: /health
